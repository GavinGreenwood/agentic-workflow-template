mode: ContinuousDelivery

branches:
  main:
    regex: ^main$
    label: ""
    increment: Minor
    prevent-increment-of-merged-branch-version: true
    track-merge-target: false
    is-mainline: true
  feature:
    regex: ^(feature|feat)[/-]
    label: alpha
    increment: Patch
    source-branches: ["main"]
  chore:
    regex: ^chore[/-]
    label: chore
    increment: Patch
    source-branches: ["main"]
  pull-request:
    regex: ^(pull|pull\-requests|pr)[/-]
    label: PullRequest
    label-number-pattern: '[/-](?<number>\d+)[-/]'
    increment: Inherit
    source-branches: ["main", "feature", "chore"]

next-version: 1.0.0
