name: Security

on:
  workflow_call:
  workflow_dispatch:

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: npm audit
        # Threshold is 'critical' rather than 'high' because the high-severity findings
        # are either: (a) in @nestjs/cli devDependencies that never run in production,
        # or (b) in transitive deps of runtime packages (postcss in Next.js, lodash in
        # @nestjs/swagger) where the fix requires a major-version upgrade. Those should
        # be tracked and resolved on a planned upgrade cycle, not as a hard gate.
        # Zero critical vulnerabilities are allowed — if any appear, this step will fail.
        run: npm audit --audit-level=critical

      - name: Secretlint
        run: npx secretlint "**/*"

      - name: Generate SBOM (CycloneDX)
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-format json --output-file sbom.json
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom.json
          retention-days: 30

      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/nodejs
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true
